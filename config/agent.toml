# RoboTunnel Agent Configuration

[server]
# Port the agent listens on for tunnel connections
listen_port = 11411
# Ed25519 public key allowlist (hex). Required by default.
# authorized_keys = ["<64-hex-public-key>"]
# Development-only override. Keep false in real deployments.
# insecure_allow_any_client = false

[platform]
# Platform API URL for heartbeat and registration
api_url = "https://api.robotunnel.io"
# Robot API key (set via environment variable RT_API_KEY or here)
# api_key = "rob_xxxxxxxxxx"

[webrtc]
# Enable WebRTC signaling + ICE bootstrap (agent side)
enabled = true
# Optional stable robot identifier for signaling session
# robot_id = "robot-sim-01"
# STUN-only phase timeout before TURN fallback
stun_timeout_secs = 8

[heartbeat]
# Heartbeat interval in seconds
interval_secs = 30

[logging]
# Log level: trace, debug, info, warn, error
level = "info"
