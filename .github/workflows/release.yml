name: Release Agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            asset_name: robotunnel-agent-linux-amd64
            install_packages: musl-tools
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: robotunnel-agent-linux-arm64
            install_packages: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          manifest_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          tag_core_version="${tag_version%%[-+]*}"

          if [[ -z "${manifest_version}" ]]; then
            echo "Unable to read package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${manifest_version}" != "${tag_core_version}" ]]; then
            echo "Tag ${tag_version} does not match Cargo.toml core version ${manifest_version}" >&2
            exit 1
          fi

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"
          echo "git_commit=${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system packages
        if: matrix.install_packages != ''
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ${{ matrix.install_packages }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        env:
          ROBOTUNNEL_BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          ROBOTUNNEL_GIT_COMMIT: ${{ steps.meta.outputs.git_commit }}
        run: cargo build --locked --release --target "${{ matrix.target }}" --bin robotunnel-agent

      - name: Stage release artifact
        shell: bash
        run: |
          mkdir -p dist
          install -m 0755 "target/${{ matrix.target }}/release/robotunnel-agent" "dist/${{ matrix.asset_name }}"

      - name: Smoke test release artifact
        shell: bash
        run: |
          file "dist/${{ matrix.asset_name }}"
          "dist/${{ matrix.asset_name }}" --version

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shasum -a 256 * > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: robotunnel-agent ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*

  publish_downloads:
    name: Publish downloads.robotunnel.io agent
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL || 'https://downloads.robotunnel.io' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required R2 secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(R2_BUCKET R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY)
          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("${key}")
            fi
          done

          if ((${#missing[@]} > 0)); then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shasum -a 256 * > checksums.txt

      - name: Build download layout
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="${RELEASE_TAG#v}"
          stage="publish"
          public_base="${R2_PUBLIC_BASE_URL%/}/agent"

          mkdir -p "${stage}/agent/${tag}" "${stage}/agent/latest"
          cp dist/* "${stage}/agent/${tag}/"
          cp dist/* "${stage}/agent/latest/"
          printf '%s\n' "${tag}" > "${stage}/agent/${tag}/VERSION"
          printf '%s\n' "${tag}" > "${stage}/agent/latest/VERSION"
          cp scripts/install-agent.sh "${stage}/agent/install-agent.sh"
          cp scripts/install-agent.config.example "${stage}/agent/install-agent.config.example"

          cat > "${stage}/agent/latest.json" <<EOF
          {
            "tag": "${tag}",
            "version": "${version}",
            "base_url": "${public_base}/${tag}",
            "assets": {
              "linux_amd64": "robotunnel-agent-linux-amd64",
              "linux_arm64": "robotunnel-agent-linux-arm64"
            },
            "checksums": "checksums.txt"
          }
          EOF

      - name: Install AWS CLI
        shell: bash
        run: |
          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "${GITHUB_PATH}"

      - name: Upload immutable versioned assets
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          tag="${RELEASE_TAG}"
          aws s3 cp "publish/agent/${tag}/" "s3://${R2_BUCKET}/agent/${tag}/" \
            --recursive \
            --only-show-errors \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload latest channel and installer assets
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp "publish/agent/latest/" "s3://${R2_BUCKET}/agent/latest/" \
            --recursive \
            --only-show-errors \
            --endpoint-url "${endpoint}" \
            --cache-control "public, max-age=300"
          aws s3 cp "publish/agent/latest.json" "s3://${R2_BUCKET}/agent/latest.json" \
            --only-show-errors \
            --endpoint-url "${endpoint}" \
            --cache-control "public, max-age=300" \
            --content-type "application/json"
          aws s3 cp "publish/agent/install-agent.sh" "s3://${R2_BUCKET}/agent/install-agent.sh" \
            --only-show-errors \
            --endpoint-url "${endpoint}" \
            --cache-control "public, max-age=300" \
            --content-type "text/x-shellscript"
          aws s3 cp "publish/agent/install-agent.config.example" "s3://${R2_BUCKET}/agent/install-agent.config.example" \
            --only-show-errors \
            --endpoint-url "${endpoint}" \
            --cache-control "public, max-age=300" \
            --content-type "text/plain; charset=utf-8"
