name: Release Agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            asset_name: robotunnel-agent-linux-amd64
            install_packages: musl-tools
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: robotunnel-agent-linux-arm64
            install_packages: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          manifest_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          tag_core_version="${tag_version%%[-+]*}"

          if [[ -z "${manifest_version}" ]]; then
            echo "Unable to read package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${manifest_version}" != "${tag_core_version}" ]]; then
            echo "Tag ${tag_version} does not match Cargo.toml core version ${manifest_version}" >&2
            exit 1
          fi

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"
          echo "git_commit=${GITHUB_SHA::7}" >> "${GITHUB_OUTPUT}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system packages
        if: matrix.install_packages != ''
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ${{ matrix.install_packages }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: bash
        env:
          ROBOTUNNEL_BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          ROBOTUNNEL_GIT_COMMIT: ${{ steps.meta.outputs.git_commit }}
        run: cargo build --locked --release --target "${{ matrix.target }}" --bin robotunnel-agent

      - name: Stage release artifact
        shell: bash
        run: |
          mkdir -p dist
          install -m 0755 "target/${{ matrix.target }}/release/robotunnel-agent" "dist/${{ matrix.asset_name }}"

      - name: Smoke test release artifact
        shell: bash
        run: |
          file "dist/${{ matrix.asset_name }}"
          "dist/${{ matrix.asset_name }}" --version

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shasum -a 256 * > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: robotunnel-agent ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
